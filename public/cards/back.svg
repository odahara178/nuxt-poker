  <!-- cross-hatch border pattern -->
  <rect x="5" y="5" width="60" height="88" rx="4" fill="none" stroke="#4a7fd4" stroke-width="2" />
  <rect x="9" y="9" width="52" height="80" rx="3" fill="none" stroke="#4a7fd4" stroke-width="1" />
  <!-- diagonal lines -->
